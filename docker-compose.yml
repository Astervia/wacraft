services:
    server:
        image: astervia/wacraft-server:latest
        restart: unless-stopped
        depends_on:
            db:
                condition: service_started
            redis:
                condition: service_healthy
                required: false
        ports:
            - "6900:6900"
        env_file:
            - .env
        environment:
            DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
            HOST: http://127.0.0.1
            PORT: 6900
            MESSAGE_STATUS_SYNC_TIMEOUT_SECONDS: 10
            SYNC_BACKEND: ${SYNC_BACKEND:-memory}
            REDIS_URL: ${REDIS_URL:-redis://redis:6379}
        deploy:
            replicas: ${APP_REPLICAS:-1}
        networks:
            - main

    client:
        image: astervia/wacraft-client:latest
        restart: unless-stopped
        depends_on:
            - server
        ports:
            - "80:80"
        env_file:
            - .env
        environment:
            IS_LITE: false
        networks:
            - main

    db:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: postgres
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        volumes:
            - db_data:/var/lib/postgresql/data
        networks:
            - main

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        profiles: [distributed]
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 3
        volumes:
            - redis_data:/data
        networks:
            - main

volumes:
    db_data:
    redis_data:

networks:
    main:
